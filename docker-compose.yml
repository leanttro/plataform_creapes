version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
    ports:
      - "5000:5000"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.creapes-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.creapes-api.entrypoints=websecure"
      - "traefik.http.routers.creapes-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.creapes-api.loadbalancer.server.port=5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.creapes-app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.creapes-app.entrypoints=websecure"
      - "traefik.http.routers.creapes-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.creapes-app.loadbalancer.server.port=80"
